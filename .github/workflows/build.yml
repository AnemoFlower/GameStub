name: Build App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run make
        run: make

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: GameStub-artifacts
          path: ./dist
